# =========================================
# Epidemia Monitoramento - Exemplo de Configuração
# =========================================
#
# Este arquivo mostra como configurar o projeto com MySQL.
# Para usar:
# 1. Copie este arquivo para: src/main/resources/application-mysql.properties
# 2. Instale e configure o MySQL
# 3. Execute: mvn spring-boot:run -Dspring.profiles.active=mysql
#
# OU use variáveis de ambiente (recomendado):
# Windows CMD:
#   set DB_URL=jdbc:mysql://localhost:3306/epidemia?...
#   set DB_USER=root
#   set DB_PASSWORD=sua_senha
#   mvn spring-boot:run
#
# Linux/Mac:
#   export DB_URL=jdbc:mysql://localhost:3306/epidemia?...
#   export DB_USER=root
#   export DB_PASSWORD=sua_senha
#   mvn spring-boot:run
#

# =========================================
# Configurações do Servidor
# =========================================
server.port=8080
server.servlet.context-path=/

# =========================================
# Codificação
# =========================================
spring.web.encoding.enabled=true
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true

# =========================================
# MySQL Database Configuration
# =========================================
# Descomente as linhas abaixo para usar MySQL em vez de H2
#
# spring.datasource.url=jdbc:mysql://localhost:3306/epidemia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&useUnicode=true&characterEncoding=UTF-8
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#

# =========================================
# JPA / Hibernate Configuration
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================================
# Logging
# =========================================
logging.level.root=INFO
logging.level.com.monitoramento.epidemia=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =========================================
# Jackson (JSON)
# =========================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.indent-output=true

# =========================================
# Actuator (monitoring - opcional)
# =========================================
